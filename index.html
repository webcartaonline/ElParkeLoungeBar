<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#003C66" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#003C66" media="(prefers-color-scheme: dark)">
    <title>El Parke Lounge Bar</title>
    <link rel="stylesheet" href="index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <img class="Logo" src="Recursos/Logo/IsoLogoWhiteBackgroundBlue.png" alt="Logotipo del comercio llamado El Parque lounch bar que se compone de un arbol y el nombre del local">

        <div class="SelectorIdioma">
            <img class="IconoIdioma" src="Recursos/Icons/LenguageBotton.png" alt="Icono para cambiar el idioma">
            <select class="MenuIdioma" aria-label="Seleccionar idioma">
                <option value="ES" selected>Español</option>
                <option value="EN">English</option>
            </select>
        </div>
    </header>

    <main>
        <h1 class="Welcome">¡ BIENVENIDO !</h1>
        <h3 class="QueApetece">¿Que te apetece hoy?</h3>

        <a href="SeccionesES/desayunoES.html" class="ButtonDesayunoInicio">
            <img src="Recursos/Desayunos/ToastAndCoffe.png" alt="Imagen de fondo blanco con una ilustración en 3D que muestra en el centro de la imagen una tostada y una taza de café">
            <p>Desayunar</p>
        </a>

        <a href="SeccionesES/comidaES.html" class="ButtonComidaInicio">
            <p class="AlertaInicio">Disponible en mesa azul</p>
            <img class="SeccionComida" src="Recursos/Comidas/Eat.jpg" alt="Imagen de fondo blanco con una ilustración en 3D que muestra en el centro de la imágen una hamburguesa y un bocadillo">
            <p>Comer o cenar</p>
        </a>

        <a href="SeccionesES/tapeoES.html" class="ButtonTapeoInicio">
            <img src="Recursos/Tapeo/MarineraAndCaña.png" alt="Imagen de fondo blanco con una ilustración en 3D que muestra en el centro de la imágen una marinera y una caña">
            <p>Tapeo</p>
        </a>

        <a href="SeccionesES/dulceES.html" class="ButtonDulceInicio">
            <img src="Recursos/Dulces/GranizadoCopaHelado.png" alt="Imagen de fondo blanco con una ilustración en 3D que muestra en el centro de la imágen un granizado y una copa de elado con tres bolas de diferente sabor">
            <p>Algo dulce</p>
        </a>

        <a href="SeccionesES/bebidasES.html" class="ButtonDulceInicio">
            <img class="SeccionBebida" src="Recursos/Bebidas/PortadaBebidas.png" alt="Imagen de fondo blanco con una ilustración en 3D que muestra en el centro de la imágen una botella de agua y una botella de vino">
            <p>Bebidas</p>
        </a>

    </main>

<script src="idiomas.js"></script>
</body>
</html>
