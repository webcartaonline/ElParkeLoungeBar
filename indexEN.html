<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#003C66" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#003C66" media="(prefers-color-scheme: dark)">
    <title>El Parke Lounge Bar</title>
    <link rel="stylesheet" href="index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <img class="Logo" src="Recursos/Logo/IsoLogoWhiteBackgroundBlue.png" alt="Logo of El Parke Lounge Bar, made up of a tree and the name of the venue">

        <div class="SelectorIdioma">
            <img class="IconoIdioma" src="Recursos/Icons/LenguageBotton.png" alt="Icon to change the language">
            <select class="MenuIdioma" aria-label="Select language">
                <option value="ES">Español</option>
                <option value="EN" selected>English</option>
            </select>
        </div>
    </header>

    <main>
        <h1 class="Welcome">WELCOME!</h1>
        <h3 class="QueApetece">What are you in the mood for today?</h3>

        <a href="SeccionesEN/desayunoEN.html" class="ButtonDesayunoInicio">
            <img src="Recursos/Desayunos/ToastAndCoffe.png" alt="White background image with a 3D illustration showing a slice of toast and a cup of coffee">
            <p>Breakfast</p>
        </a>

        <a href="SeccionesEN/comidaEN.html" class="ButtonComidaInicio">
            <p class="AlertaInicio">Available at blue tables</p>
            <img class="SeccionComida" src="Recursos/Comidas/Eat.jpg" alt="White background image with a 3D illustration showing a burger and a baguette sandwich">
            <p>Lunch or dinner</p>
        </a>

        <a href="SeccionesEN/tapeoEN.html" class="ButtonTapeoInicio">
            <img src="Recursos/Tapeo/MarineraAndCaña.png" alt="White background image with a 3D illustration showing a marinera and a caña beer">
            <p>Tapas</p>
        </a>

        <a href="SeccionesEN/dulceEN.html" class="ButtonDulceInicio">
            <img src="Recursos/Dulces/GranizadoCopaHelado.png" alt="White background image with a 3D illustration showing a slushie and an ice cream sundae with three different flavour scoops">
            <p>Something sweet</p>
        </a>

        <a href="SeccionesEN/bebidasEN.html" class="ButtonDulceInicio">
            <img class="SeccionBebida" src="Recursos/Bebidas/PortadaBebidas.png" alt="White background image with a 3D illustration showing a bottle of water and a bottle of wine">
            <p>Drinks</p>
        </a>

    </main>

<script src="idiomas.js"></script>
</body>
</html>
